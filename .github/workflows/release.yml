name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.0). Only used for manual dispatch.'
        required: true
        default: '0.0.0'

jobs:
  release:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show tool versions
        run: |
          xcode-select -p
          swift --version
          xcodebuild -version

      # `swift build --arch a --arch b` 需要完整 Xcode 的 XCBuild，且行为在 CI 上不稳。
      # 走稳的老路：两个 slice 分别 build，再 lipo -create 合成 universal。
      - name: Build arm64 slice
        working-directory: app/tasker
        run: swift build -c release --arch arm64

      - name: Build x86_64 slice
        working-directory: app/tasker
        run: swift build -c release --arch x86_64

      - name: Combine into universal binary
        working-directory: app/tasker
        run: |
          ARM64_BIN="$(swift build --show-bin-path -c release --arch arm64)/tasker"
          X86_BIN="$(swift build --show-bin-path -c release --arch x86_64)/tasker"
          echo "arm64 slice: $ARM64_BIN"
          echo "x86_64 slice: $X86_BIN"
          mkdir -p .build/universal
          lipo -create "$ARM64_BIN" "$X86_BIN" -output .build/universal/tasker
          lipo -info .build/universal/tasker
          lipo -verify_arch .build/universal/tasker arm64
          lipo -verify_arch .build/universal/tasker x86_64

      - name: Generate AppIcon.icns
        run: bash scripts/make-icon.sh

      - name: Package .app bundle
        run: bash scripts/make-app-bundle.sh "${{ steps.version.outputs.version }}" app/tasker/.build/universal/tasker

      - name: Zip bundle
        working-directory: dist
        run: zip -yr "tasker-${{ steps.version.outputs.version }}.zip" tasker.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref_type == 'tag'
        with:
          files: dist/tasker-${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
          body: |
            Universal binary (arm64 + x86_64) — one download works on both Apple Silicon and Intel Macs.

            ## Install

            1. Download `tasker-${{ steps.version.outputs.version }}.zip` and unzip.
            2. Move `tasker.app` to `/Applications`.
            3. **First launch (unsigned app)**: right-click the app → **Open** → confirm. macOS remembers your choice.

            If that fails (some macOS versions), run once in Terminal:
            ```
            xattr -d com.apple.quarantine /Applications/tasker.app
            ```

            ## Data location

            Tasks are stored in `~/Documents/tasker/` by default; you can change this in the app's Settings.

      - name: Upload artifact (manual runs)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: tasker-${{ steps.version.outputs.version }}
          path: dist/tasker-${{ steps.version.outputs.version }}.zip
